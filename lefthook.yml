# Lefthook configuration
# Refer: https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "*.{js,ts,jsx,tsx,json}"
      run: npx @biomejs/biome check --staged --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
